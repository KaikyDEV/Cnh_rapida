events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # HTTP Redirect to HTTPS
    server {
        listen 80;
        server_name cnhrapido.tech www.cnhrapido.tech 72.62.15.46.nip.io 72.62.15.46;
        
        # Certbot webroot challenge location (optional, but good for renewals without stopping nginx)
        location ~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS Server
    server {
        listen 443 ssl;
        server_name cnhrapido.tech www.cnhrapido.tech 72.62.15.46.nip.io 72.62.15.46;

        ssl_certificate /etc/letsencrypt/live/cnhrapido.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/cnhrapido.tech/privkey.pem;
        
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Resolver interno do Docker
        resolver 127.0.0.11 valid=30s;

        location /api {
            set $backend_upstream "http://backend:8080";
            proxy_pass $backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            set $frontend_upstream "http://frontend:3000";
            proxy_pass $frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
